name: Release Data Version Sync

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (for example: v0.3.3 or 0.3.3)"
        required: false
        type: string
      auto_merge:
        description: "Enable auto-merge for the generated PR"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-data-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$TAG" ]]; then
            TAG="${{ inputs.release_tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "No release tag provided."
            exit 1
          fi

          NORMALIZED_TAG="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "normalized_tag=$NORMALIZED_TAG" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${NORMALIZED_TAG//./-}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply data_version updates
        run: |
          python scripts/set_reports_data_version.py --tag "${{ steps.tag.outputs.tag }}"

      - name: Create release data_version PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/release-data-version-${{ steps.tag.outputs.branch_slug }}
          delete-branch: true
          title: "chore: apply data_version ${{ steps.tag.outputs.normalized_tag }} to reports"
          commit-message: "chore: apply data_version ${{ steps.tag.outputs.normalized_tag }} to reports"
          body: |
            This PR was generated automatically from release tag `${{ steps.tag.outputs.tag }}`.

            Changes:
            - Applies `data_version: ${{ steps.tag.outputs.normalized_tag }}`
            - Targets all `reports/<year>` directories where `year >= 2025`
            - Adds `data_version` if missing, or updates in place if present

            After merge, publish/re-publish the release from updated `main`.
          labels: |
            automation
            release
            data-version

      - name: Merge PR
        if: ${{ steps.cpr.outputs.pull-request-number != '' && (github.event_name == 'release' || inputs.auto_merge == true) }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER=${{ steps.cpr.outputs.pull-request-number }}
          REPO="avidml/avid-db"
          
          # Get PR commit SHA
          COMMIT_SHA=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.head.sha')
          echo "Merging PR $PR_NUMBER (commit: $COMMIT_SHA)"
          
          # Merge via REST API with admin bypass
          gh api repos/$REPO/pulls/$PR_NUMBER/merge \
            -X PUT \
            -f commit_title="chore: apply data_version to reports" \
            -f merge_method=squash \
            -f sha="$COMMIT_SHA"
          
          echo "PR merged successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh main branch
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Recreate release with updated data_version
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          
          # Delete old release but keep the tag
          gh release delete "$TAG" -y || true
          
          # Create new release from updated main
          gh release create "$TAG" \
            --target main \
            --title "Release $TAG" \
            --notes "AVID Database release $TAG with updated data_version in all reports." \
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
